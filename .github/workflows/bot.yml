name: Monitor Fraldas
 
on:
  schedule:
    - cron: '0 11 * * *'  # 08h horário de Brasília
    - cron: '0 23 * * *'  # 20h horário de Brasília
  workflow_dispatch:         # permite rodar manualmente
 
jobs:
  monitorar:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Instalar dependências
        run: pip install -r requirements.txt
      - name: Baixar CSV histórico
        uses: actions/download-artifact@v4
        with:
          name: historico-precos
          path: .
          merge-multiple: true
        continue-on-error: true # ok se não existir ainda
      - name: Rodar bot
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          SCRAPERAPI_KEY: ${{ secrets.SCRAPERAPI_KEY }}
        run: python bot_fraldas.py
      - name: Salvar CSV histórico
        uses: actions/upload-artifact@v4
        with:
          name: historico-precos
          path: precos_fraldas.csv
          retention-days: 90
          overwrite: true
